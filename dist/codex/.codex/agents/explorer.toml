# ADD sub-agent — explorer
#
# Broad, lower-stakes codebase sweeps (architecture discovery, dependency
# mapping, pattern detection). Used by /add-docs and /add-optimize in their
# discovery phases. Read-only by design.
# See spec AC-015..AC-020.

name = "explorer"
description = "Broad, read-only codebase exploration. Used for discovery, mapping, and pattern detection."
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
# Codex ≥0.14x agent-role schema (issue #24): prompt_skill was removed;
# developer_instructions is the required behavioral field. The skill file
# remains the single source of behavior — the agent loads it at start.
developer_instructions = "You are this role's dedicated sub-agent. First read ~/.codex/skills/add-docs/SKILL.md and adopt it verbatim as your role definition and operating constraints, then execute the task you were spawned with. Honor the sandbox_mode declared for this role."
