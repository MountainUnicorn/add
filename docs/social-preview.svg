<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>

    <radialGradient id="glowTL" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#b00149" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#b00149" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="85%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#d4326d" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#d4326d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b00149"/>
      <stop offset="50%" stop-color="#d4326d"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>

    <linearGradient id="pillBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glowTL)"/>
  <rect width="1280" height="640" fill="url(#glowBR)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Top-left version pill -->
  <g transform="translate(72, 56)">
    <rect x="0" y="0" width="138" height="30" rx="15"
          fill="rgba(176,1,73,0.15)" stroke="#b00149" stroke-width="1"/>
    <text x="69" y="20" text-anchor="middle"
          font-family="SF Mono, Monaco, monospace" font-size="13" font-weight="600"
          fill="#ff6b9d">v0.9 · beta · signed</text>
  </g>

  <!-- Top-right eyebrow -->
  <text x="1208" y="76" text-anchor="end"
        font-family="system-ui, -apple-system, sans-serif" font-size="13"
        font-weight="600" letter-spacing="2" fill="rgba(255,255,255,0.55)">
    GETADD.DEV
  </text>

  <!-- Main mark: ADD -->
  <text x="72" y="280"
        font-family="system-ui, -apple-system, sans-serif" font-size="180"
        font-weight="800" letter-spacing="-6" fill="url(#accentGrad)">
    ADD
  </text>

  <!-- Tagline -->
  <text x="72" y="340"
        font-family="system-ui, -apple-system, sans-serif" font-size="28"
        font-weight="600" letter-spacing="-0.5" fill="#ffffff">
    Agent Driven Development
  </text>

  <!-- Subhead -->
  <text x="72" y="388"
        font-family="system-ui, -apple-system, sans-serif" font-size="19"
        font-weight="400" fill="rgba(255,255,255,0.7)">
    <tspan>Coordinated AI agent teams that ship</tspan>
    <tspan x="72" dy="28">verified software. Spec-first. TDD-strict.</tspan>
    <tspan x="72" dy="28">Trust-but-verify at every step.</tspan>
  </text>

  <!-- Runtime row -->
  <g transform="translate(72, 540)">
    <text x="0" y="-12"
          font-family="system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="600" letter-spacing="2" fill="rgba(255,255,255,0.5)">
      RUNS ON
    </text>

    <!-- Claude Code pill -->
    <g transform="translate(0, 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="168" height="44" rx="22"
            fill="url(#pillBg)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
      <circle cx="22" cy="22" r="4" fill="#b00149"/>
      <text x="38" y="28"
            font-family="system-ui, -apple-system, sans-serif" font-size="15"
            font-weight="600" fill="#ffffff">
        Claude Code
      </text>
    </g>

    <!-- Codex CLI pill -->
    <g transform="translate(184, 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="146" height="44" rx="22"
            fill="url(#pillBg)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
      <circle cx="22" cy="22" r="4" fill="#b00149"/>
      <text x="38" y="28"
            font-family="system-ui, -apple-system, sans-serif" font-size="15"
            font-weight="600" fill="#ffffff">
        Codex CLI
      </text>
    </g>

    <!-- More coming -->
    <text x="346" y="28"
          font-family="system-ui, -apple-system, sans-serif" font-size="13"
          font-weight="500" fill="rgba(255,255,255,0.4)">
      + more adapters coming
    </text>
  </g>

  <!-- Right-side accent: concentric rings -->
  <g transform="translate(1060, 320)" opacity="0.55">
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.35"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="12" fill="url(#accentGrad)"/>
  </g>

  <!-- Bottom-right attribution -->
  <text x="1208" y="602" text-anchor="end"
        font-family="SF Mono, Monaco, monospace" font-size="12"
        fill="rgba(255,255,255,0.35)">
    github.com/MountainUnicorn/add
  </text>
</svg>
