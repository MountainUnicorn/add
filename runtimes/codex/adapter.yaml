# ADD Codex CLI adapter
#
# Describes how `core/` compiles into a Codex-consumable distribution at `dist/codex/`.
# Consumed by `scripts/compile.py`.

runtime: codex
output_dir: dist/codex

# Codex CLI version pinning
# ------------------------
# min_codex_version: Lowest Codex CLI version that ships every feature ADD emits
# (native Skills, sub-agents, hooks, plugin marketplace). Per spec AC-032.
# Floor is 0.140.0 since v0.10.1 (#24/#26): the emitted agent-role schema
# (developer_instructions) and nested hooks.json schema only exist on the
# 0.14x generation — older CLIs reject or silently ignore both.
# codex_cli_version:  The version the CI plugin-validate job targets (AC-035).
codex_cli_version: "0.144.5"
min_codex_version: "0.140.0"

# Output mode: "native" = Codex Skills format (v0.9+). The legacy "prompts" mode
# wrote to ~/.codex/prompts/ and is no longer emitted.
skills_output: native

# Codex has no distinct "tool" vocabulary in the Claude sense — actions map to
# the shell sandbox. AskUserQuestion becomes plain-text Q&A (see the shim).
tool_mapping:
  AskUserQuestion: "ask the user (use a clear, single-question prompt)"

path_vars:
  CLAUDE_PLUGIN_ROOT: "~/.codex"

# Skill frontmatter is REWRITTEN for the native Skills layout: only `name`
# (namespaced add-<dirname>), `description`, and `argument-hint` are emitted.
# Rules ship VERBATIM (frontmatter preserved) — the maturity-loader rule reads
# each rule's `maturity:` key at runtime, so stripping would break it.
frontmatter:
  skills:
    emit: [name, description, argument-hint]
  rules:
    preserve: true

# Codex consumes content in the native layout:
#   1. AGENTS.md                                     — root context, slim manifest (≤500 lines)
#   2. .agents/skills/add-{name}/SKILL.md            — native Codex Skills with preserved frontmatter
#   3. .agents/skills/add-{name}/agents/openai.yaml  — per-skill invocation policy
#   4. .codex/agents/{role}.toml                     — sub-agent TOML files
#   5. .codex/config.toml                            — global [agents] + [features] config
#   6. .codex/hooks.json                             — hook registration
#   7. .codex/hooks/*.sh                             — hook shell scripts (mode 0755)
#   8. plugin.toml                                   — Codex plugin manifest
#   9. references/*.md                               — on-demand reference content (PR #6).
#      Prompts read these via the shell sandbox (e.g., `cat ~/.codex/add/references/learning-reference.md`).
#      Mirrors the Claude runtime's on-demand loading; token savings symmetric across both runtimes.
output_shape:
  agents_md:
    from: [core/rules/*.md]
    filter: "autoload == true"         # shared predicate with the Claude @rules list (rule_autoloads)
    strategy: slim_manifest            # rule names + summaries only; skills table generated;
                                       # pointer to knowledge/global.md (read before skills, not inlined)
    max_lines: 500                     # compile fails above this
  skills:
    from: core/skills/*/SKILL.md
    emit_to: .agents/skills/add-{dirname}/SKILL.md
    preserve_frontmatter: true
    policy: runtimes/codex/skill-policy.yaml
    askuser_shim_template: runtimes/codex/templates/askuser-shim.md
  skill_policy:
    from: runtimes/codex/skill-policy.yaml
    emit_to: .agents/skills/add-{dirname}/agents/openai.yaml
  agents:
    from: runtimes/codex/agents/*.toml
    emit_to: .codex/agents/
  codex_config:
    from: runtimes/codex/config.toml
    emit_to: .codex/config.toml
  hooks:
    from: runtimes/codex/hooks/
    emit_to: .codex/hooks/
    mode: "0755"
    manifest: .codex/hooks.json
  references:
    from: core/references/
    emit_to: references/
    substitute: codex               # path vars + /add: namespace rewritten; read on demand
  templates:
    from: core/templates/
    emit_to: templates/
    substitute: codex
  rules_files:
    from: core/rules/
    emit_to: rules/                 # individual rule files for path references from skills
    substitute: codex
  knowledge:
    from: core/knowledge/
    emit_to: knowledge/
    substitute: codex
  lib:
    from: core/lib/
    emit_to: lib/                   # shared shell helpers; .sh shipped byte-identical, mode 0755
    substitute: codex
  security:
    from: core/security/
    emit_to: security/              # injection pattern catalog, secret patterns
    substitute: codex
  plugin_manifest:
    emit_to: plugin.toml

# Files specific to the Codex adapter (copied verbatim; no compile transformation)
adapter_files:
  - README.md          # Codex-specific install + usage overview

# Known runtime limitations (documented so agents and users understand the gap)
limitations:
  - name: no-injection-scan-hook
    description: >
      The Claude runtime registers a PostToolUse prompt-injection scanner
      (posttooluse-scan.sh). NO equivalent hook ships or registers on Codex —
      .codex/hooks.json carries only the three handoff hooks. Injection
      defense on Codex is ADVISORY-ONLY: the rules/injection-defense.md text
      that the model reads. No audit events are written. Path to parity: port
      the scanner to a Codex-compatible trigger; scheduled for v1.0.
  - name: no-learnings-filter-hook
    description: >
      filter-learnings.sh ships in ~/.codex/hooks/ but is NOT registered in
      hooks.json — learnings-active.md is regenerated only when a skill invokes
      the script imperatively (per the learning rule), not automatically on
      write as in Claude Code.
  - name: hook-stderr-not-surfaced
    description: >
      Codex PostToolUse hooks run, but stderr is not automatically surfaced to
      the agent's next turn (unlike Claude Code). Warnings from hook scripts
      are invisible until the user inspects logs manually.
