# ADD Codex CLI adapter
#
# Describes how `core/` compiles into a Codex-consumable distribution at `dist/codex/`.
# Consumed by `scripts/compile.py`.

runtime: codex
output_dir: dist/codex

# Codex CLI version pinning
# ------------------------
# min_codex_version: Lowest Codex CLI version that ships every feature ADD emits
# (native Skills, sub-agents, hooks, plugin marketplace). Per spec AC-032.
# codex_cli_version:  The version the CI plugin-validate job targets (AC-035).
codex_cli_version: "0.122.0"
min_codex_version: "0.122.0"

# Output mode: "native" = Codex Skills format (v0.9+). The legacy "prompts" mode
# wrote to ~/.codex/prompts/ and is no longer emitted.
skills_output: native

# Codex has no distinct "tool" vocabulary in the Claude sense — actions map to
# the shell sandbox. AskUserQuestion becomes plain-text Q&A (see the shim).
tool_mapping:
  AskUserQuestion: "ask the user (use a clear, single-question prompt)"

path_vars:
  CLAUDE_PLUGIN_ROOT: "~/.codex"

# Codex prompts have no frontmatter — the Claude extensions get stripped.
frontmatter:
  skills:
    strip: [description, argument-hint, allowed-tools, disable-model-invocation]
  rules:
    strip: [autoload, maturity, description, globs]

# Codex consumes content in the native layout:
#   1. AGENTS.md                                     — root context, slim manifest (≤500 lines)
#   2. .agents/skills/add-{name}/SKILL.md            — native Codex Skills with preserved frontmatter
#   3. .agents/skills/add-{name}/agents/openai.yaml  — per-skill invocation policy
#   4. .codex/agents/{role}.toml                     — sub-agent TOML files
#   5. .codex/config.toml                            — global [agents] + [features] config
#   6. .codex/hooks.json                             — hook registration
#   7. .codex/hooks/*.sh                             — hook shell scripts (mode 0755)
#   8. plugin.toml                                   — Codex plugin manifest
output_shape:
  agents_md:
    from: [core/knowledge/global.md, core/rules/*.md]
    strategy: slim_manifest            # autoload: always only; skills table generated
    max_lines: 500                     # compile fails above this
  skills:
    from: core/skills/*/SKILL.md
    emit_to: .agents/skills/add-{dirname}/SKILL.md
    preserve_frontmatter: true
    policy: runtimes/codex/skill-policy.yaml
    askuser_shim_template: runtimes/codex/templates/askuser-shim.md
  skill_policy:
    from: runtimes/codex/skill-policy.yaml
    emit_to: .agents/skills/add-{dirname}/agents/openai.yaml
  agents:
    from: runtimes/codex/agents/*.toml
    emit_to: .codex/agents/
  codex_config:
    from: runtimes/codex/config.toml
    emit_to: .codex/config.toml
  hooks:
    from: runtimes/codex/hooks/
    emit_to: .codex/hooks/
    mode: "0755"
    manifest: .codex/hooks.json
  templates:
    from: core/templates/
    copy_verbatim: true
  plugin_manifest:
    emit_to: plugin.toml

# Files specific to the Codex adapter (copied verbatim; no compile transformation)
adapter_files:
  - README.md          # Codex-specific install + usage overview

# Known runtime limitations (documented so agents and users understand the gap)
limitations:
  - name: hook-stderr-not-surfaced
    description: >
      Codex PostToolUse hooks run, but stderr is not automatically surfaced to
      the agent's next turn (unlike Claude Code). The prompt-injection scan
      hook still writes audit events to .add/security/injection-events.jsonl,
      but the ADD-SEC warning is invisible until the user inspects the log
      (manually or via /add:retro). Path to parity: an adapter-side polling
      reader that tails injection-events.jsonl into each prompt turn; scheduled
      for v1.0.
