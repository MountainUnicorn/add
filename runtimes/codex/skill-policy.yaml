# ADD Codex skill invocation policy
#
# Source of truth for each skill's Codex-native metadata: whether the skill may
# be implicitly invoked by Codex's description-matching dispatcher, and what
# tool surface it needs. Consumed by `scripts/compile.py::emit_codex_native_skills`.
#
# AC-009: compile fails if any skill under `core/skills/` is missing a policy entry.
# AC-007: high-leak interview skills set allow_implicit_invocation: false.
# AC-008: other skills default to true.
#
# Schema (per entry):
#   skill: string                      — directory name under core/skills/
#   allow_implicit_invocation: bool    — required
#   tools: string[]                    — required; subset of bash/read/edit/write/webfetch/mcp:*
#   requires_askuser_shim: bool        — optional; default false

skills:
  # --- High-leak interview skills — explicit invocation only ---
  - skill: spec
    allow_implicit_invocation: false
    tools: [read, write, edit, bash]
    requires_askuser_shim: true

  - skill: brand-update
    allow_implicit_invocation: false
    tools: [read, write, edit, bash]
    requires_askuser_shim: true

  - skill: away
    allow_implicit_invocation: false
    tools: [read, write, edit, bash]
    requires_askuser_shim: true

  - skill: tdd-cycle
    allow_implicit_invocation: false
    tools: [read, write, edit, bash]

  - skill: implementer
    allow_implicit_invocation: false
    tools: [read, write, edit, bash]

  - skill: deploy
    allow_implicit_invocation: false
    tools: [read, write, edit, bash]

  # --- Dispatcher-eligible skills — description match may auto-invoke ---
  - skill: init
    allow_implicit_invocation: true
    tools: [read, write, edit, bash]
    requires_askuser_shim: true

